    <!-- Buffer polyfill for isomorphic-git in WASM environment -->
    <script>
        if (typeof Buffer === 'undefined') {
            window.Buffer = class Buffer extends Uint8Array {
                static from(data, encoding) {
                    if (typeof data === 'string') {
                        const encoder = new TextEncoder();
                        return new Buffer(encoder.encode(data));
                    }
                    return new Buffer(data);
                }
                static alloc(size) {
                    return new Buffer(size);
                }
                static allocUnsafe(size) {
                    return new Buffer(size);
                }
                static isBuffer(obj) {
                    return obj instanceof Buffer || obj instanceof Uint8Array;
                }
                static concat(list, totalLength) {
                    if (!Array.isArray(list)) throw new TypeError('list argument must be an Array of Buffers');
                    if (list.length === 0) return new Buffer(0);
                    
                    let i;
                    if (totalLength === undefined) {
                        totalLength = 0;
                        for (i = 0; i < list.length; ++i) {
                            totalLength += list[i].length;
                        }
                    }
                    
                    const buffer = new Buffer(totalLength);
                    let pos = 0;
                    for (i = 0; i < list.length; ++i) {
                        let buf = list[i];
                        if (pos + buf.length > totalLength) {
                            buffer.set(buf.subarray(0, totalLength - pos), pos);
                            break;
                        }
                        buffer.set(buf, pos);
                        pos += buf.length;
                    }
                    return buffer;
                }
                toString(encoding = 'utf8') {
                    if (encoding === 'utf8' || encoding === 'utf-8') {
                        return new TextDecoder().decode(this);
                    }
                    if (encoding === 'hex') {
                        return Array.from(this).map(b => b.toString(16).padStart(2, '0')).join('');
                    }
                    return super.toString();
                }
                write(string, offset = 0, length, encoding = 'utf8') {
                    if (typeof string === 'string') {
                        const encoder = new TextEncoder();
                        const encoded = encoder.encode(string);
                        const bytesToWrite = length ? Math.min(encoded.length, length) : encoded.length;
                        this.set(encoded.subarray(0, bytesToWrite), offset);
                        return bytesToWrite;
                    }
                    return 0;
                }
                slice(start = 0, end) {
                    return this.subarray(start, end);
                }
            };
        }
    </script>
