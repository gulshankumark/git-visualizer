name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install npm dependencies
        run: npm ci
        working-directory: src/GitVisualizer/wwwroot

      - name: Build
        run: dotnet build git-visualizer.sln --configuration Release

      - name: Test with coverage
        run: dotnet test git-visualizer.sln --collect:"XPlat Code Coverage" --configuration Release
