name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install npm dependencies
        run: npm ci
        working-directory: src/GitVisualizer/wwwroot

      - name: Build
        run: dotnet build git-visualizer.sln --configuration Release

      - name: Test
        run: dotnet test git-visualizer.sln --no-build --configuration Release

      - name: Publish
        run: dotnet publish src/GitVisualizer -c Release -o publish/ --no-build

      - name: Fix base href for GitHub Pages sub-path
        run: sed -i 's|<base href="/" />|<base href="/git-visualizer/" />|' publish/wwwroot/index.html

      - name: Copy index.html to 404.html for SPA routing
        run: cp publish/wwwroot/index.html publish/wwwroot/404.html

      - name: Disable Jekyll (allow _framework/ to be served)
        run: touch publish/wwwroot/.nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e # v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./publish/wwwroot
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
